name: Job Scout

on:
  # Manual trigger — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Jobs posted within last N days'
        required: false
        default: '7'
        type: choice
        options: ['1', '3', '7', '14', '30']
      threshold:
        description: 'Minimum match score (0-100)'
        required: false
        default: '65'
      dry_run:
        description: 'Dry run (no Telegram/Drive)'
        required: false
        default: false
        type: boolean

  # Scheduled trigger — runs daily at 9am JST (midnight UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode resume
        run: echo "$RESUME_BASE64" | base64 -d > resume.docx
        env:
          RESUME_BASE64: ${{ secrets.RESUME_BASE64 }}

      - name: Generate config.yaml
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python3 -c "
          import yaml, os
          config = {
              'serpapi_key': os.environ['SERPAPI_KEY'],
              'openai_api_key': os.environ['OPENAI_API_KEY'],
              'telegram_bot_token': os.environ['TELEGRAM_BOT_TOKEN'],
              'telegram_chat_id': os.environ['TELEGRAM_CHAT_ID'],
              'resume_path': 'resume.docx',
              'search_combos': [
                  {'title': 'Software Engineer', 'location': 'Tokyo, Japan', 'seniority': 'Mid level'},
                  {'title': 'Backend Developer', 'location': 'Tokyo, Japan', 'seniority': 'Mid level'},
                  {'title': 'Platform Engineer', 'location': 'Tokyo, Japan', 'seniority': 'Mid level'},
              ],
              'sources': ['linkedin', 'tokyodev', 'indeed', 'google_jobs'],
              'days_back': 7,
              'match_threshold': 65,
              'max_results_per_combo': 50,
              'max_telegram_sends': 50,
              'openai_model': 'gpt-4o-mini',
              'gdrive_enabled': True,
              'gdrive_folder_id': os.environ['GDRIVE_FOLDER_ID'],
          }
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          print('✅ config.yaml generated')
          print(open('config.yaml').read())
          "

      - name: Override config from inputs (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python3 -c "
          import yaml
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          days_back = '${{ inputs.days_back }}'
          threshold = '${{ inputs.threshold }}'
          if days_back:
              config['days_back'] = int(days_back)
          if threshold:
              config['match_threshold'] = int(threshold)
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          print('⚙️ Config after overrides:')
          print(open('config.yaml').read())
          "

      - name: Verify setup
        run: |
          echo "📂 Files in workspace:"
          ls -la
          echo ""
          echo "📄 Resume file size:"
          wc -c resume.docx
          echo ""
          echo "📋 Config:"
          cat config.yaml

      - name: Run Job Scout
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi