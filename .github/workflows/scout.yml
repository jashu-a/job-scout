name: Job Scout

on:
  # Manual trigger — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Jobs posted within last N days'
        required: false
        default: '5'
        type: choice
        options: ['1', '3', '5', '7', '14', '30']
      threshold:
        description: 'Minimum match score (0-100)'
        required: false
        default: '65'
      dry_run:
        description: 'Dry run (no Telegram/Drive)'
        required: false
        default: false
        type: boolean

  # Scheduled trigger — runs daily at 9am JST (midnight UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq libreoffice-writer > /dev/null 2>&1
          echo "✅ LibreOffice installed for PDF conversion"

      - name: Decode resume (if provided via secret)
        run: |
          if [ -z "$RESUME_BASE64" ]; then
            echo "📄 No RESUME_BASE64 secret — will download resume from Google Drive"
          else
            echo "$RESUME_BASE64" | base64 -d > resume_raw
            FILE_TYPE=$(file -b --mime-type resume_raw)
            echo "Detected file type: $FILE_TYPE"
            if echo "$FILE_TYPE" | grep -q "pdf"; then
              mv resume_raw resume.pdf
              echo "📄 Resume is PDF (from secret)"
            else
              mv resume_raw resume.docx
              echo "📄 Resume is DOCX (from secret)"
            fi
          fi
        env:
          RESUME_BASE64: ${{ secrets.RESUME_BASE64 }}

      - name: Generate config.yaml
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python3 -c "
          import yaml, os

          # Load user-specific config (search combos, sources, thresholds)
          user_cfg = {}
          if os.path.exists('user_config.yaml'):
              with open('user_config.yaml') as f:
                  user_cfg = yaml.safe_load(f) or {}
              print('✅ Loaded user_config.yaml')
          else:
              print('⚠️  No user_config.yaml found — using defaults')

          # Merge: secrets (from GitHub) + user preferences (from file)
          config = {
              'serpapi_key': os.environ['SERPAPI_KEY'],
              'openai_api_key': os.environ['OPENAI_API_KEY'],
              'telegram_bot_token': os.environ['TELEGRAM_BOT_TOKEN'],
              'telegram_chat_id': os.environ['TELEGRAM_CHAT_ID'],
              'resume_path': 'resume.pdf' if os.path.exists('resume.pdf') else 'resume.docx',
              'search_combos': user_cfg.get('search_combos', [
                  {'title': 'Software Engineer', 'location': 'Tokyo, Japan', 'seniority': 'Mid level'},
              ]),
              'sources': user_cfg.get('sources', ['linkedin', 'tokyodev', 'japandev', 'gaijinpot', 'indeed', 'google_jobs']),
              'days_back': user_cfg.get('days_back', 5),
              'match_threshold': user_cfg.get('match_threshold', 75),
              'max_results_per_combo': user_cfg.get('max_results_per_combo', 50),
              'max_telegram_sends': user_cfg.get('max_telegram_sends', 50),
              'openai_model': user_cfg.get('openai_model', 'gpt-4o-mini'),
              'gdrive_enabled': user_cfg.get('gdrive_enabled', True),
              'gdrive_folder_id': os.environ['GDRIVE_FOLDER_ID'],
              'db_name': user_cfg.get('db_name', 'jobs.db'),
              'resume_drive_name': user_cfg.get('resume_drive_name', ''),
          }
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          print('✅ config.yaml generated')
          print(open('config.yaml').read())
          "

      - name: Override config from inputs (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python3 -c "
          import yaml
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          days_back = '${{ inputs.days_back }}'
          threshold = '${{ inputs.threshold }}'
          if days_back:
              config['days_back'] = int(days_back)
          if threshold:
              config['match_threshold'] = int(threshold)
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          print('⚙️ Config after overrides:')
          print(open('config.yaml').read())
          "

      - name: Verify setup
        run: |
          echo "📂 Files in workspace:"
          ls -la
          echo ""
          echo "📄 Resume file size:"
          wc -c resume.docx
          echo ""
          echo "📋 Config:"
          cat config.yaml

      - name: Run Job Scout
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi